<!-- Archivo: utilidades/generador.html -->
<div class="gen-box">
  <h2>Generador de Ejercicios</h2>
  <p>Selecciona el nivel de dificultad para generar tu ejercicio paso a paso.</p>
  <div class="gen-controls">
    
    <!-- Este select está deshabilitado para que el usuario no lo cambie -->
    <select id="topicSelect" disabled style="opacity: 0.7; cursor: not-allowed; background-color: var(--bg3);">
      <option value="funciones">Funciones</option>
      <option value="limites">Límites</option>
      <option value="derivadas">Derivadas</option>
      <option value="integrales">Integrales</option>
      <option value="laplace">Transformada de Laplace</option>
      <option value="ecuaciones">Ecuaciones</option>
      <option value="trigonometria">Trigonometría</option>
      <option value="logaritmos">Logaritmos</option>
      <option value="series">Series y Sucesiones</option>
      <option value="edo">Ec. Diferenciales</option>
    </select>

    <select id="diffSelect">
      <option value="basico" selected>Básico</option>
      <option value="intermedio">Intermedio</option>
      <option value="avanzado">Avanzado</option>
    </select>
    
    <button onclick="genFromTutorial()">⚡ Generar ejercicio</button>
  </div>
  <div id="tutorialExArea"></div>
</div>
