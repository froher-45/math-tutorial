<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Ejercicios — MathGen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="tutorial.css"> 
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <header></header>

  <div class="layout">

    <aside id="menu-lateral" class="sidebar"></aside>

 <main class="content">

      <div class="hero-tag">Práctica · Paso a paso</div>
      <h1>Generador de Ejercicios</h1>
      <p>Selecciona un tema, elige el nivel de dificultad y genera ejercicios con solución paso a paso.</p>

      <div class="config-panel">

      <div class="config-panel">
        <div>
          <div class="config-title">Tema</div>
          <div class="topics-grid" id="topicsGrid"></div>
        </div>

        <div class="config-row">
          <div>
            <div class="config-title">Dificultad</div>
            <div class="diff-group">
              <button class="diff-btn active" data-diff="basico">Básico</button>
              <button class="diff-btn" data-diff="intermedio">Intermedio</button>
              <button class="diff-btn" data-diff="avanzado">Avanzado</button>
            </div>
          </div>
          <div style="display:flex; align-items:flex-end;">
            <button class="gen-btn" onclick="generateExercise()">Generar ejercicio</button>
          </div>
        </div>
      </div>

      <div class="exercise-section" id="exerciseArea" style="margin-top:1.5rem;">
        <div class="empty-state">
          <div class="empty-icon">∑</div>
          <p>Selecciona un tema y genera tu primer ejercicio</p>
        </div>
      </div>

    </main>
  </div>

  <script src="components.js"></script>
  <script src="ejercicios.js"></script>
  <script src="app.js"></script>
  <script>
    loadComponents("generador");
  </script>
</body>
</html>
